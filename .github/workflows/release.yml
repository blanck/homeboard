name: Release Android APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: reactnative

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: reactnative/package-lock.json

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v4

      - name: Install JS dependencies
        run: npm ci

      - name: Inject Tibber OAuth credentials
        env:
          TIBBER_CLIENT_ID: ${{ secrets.TIBBER_CLIENT_ID }}
          TIBBER_CLIENT_SECRET: ${{ secrets.TIBBER_CLIENT_SECRET }}
        run: |
          if [ -z "$TIBBER_CLIENT_ID" ] || [ -z "$TIBBER_CLIENT_SECRET" ]; then
            echo "::warning::TIBBER_CLIENT_ID / TIBBER_CLIENT_SECRET secrets are not set; APK will ship without Tibber OAuth."
          fi
          cat > src/secrets.local.js <<EOF
          // Generated by release workflow. Do not commit.
          export const TIBBER_CLIENT_ID = '${TIBBER_CLIENT_ID}';
          export const TIBBER_CLIENT_SECRET = '${TIBBER_CLIENT_SECRET}';
          EOF

      - name: Build release APK
        working-directory: reactnative/android
        run: ./gradlew assembleRelease --no-daemon

      - name: Stage APK
        run: |
          mkdir -p ../dist
          cp android/app/build/outputs/apk/release/app-release.apk \
             "../dist/homeboard-${GITHUB_REF_NAME}.apk"
          ls -la ../dist

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: homeboard-apk-${{ github.ref_name }}
          path: dist/homeboard-*.apk
          if-no-files-found: error

      - name: Publish to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/homeboard-*.apk
          generate_release_notes: true
          fail_on_unmatched_files: true
