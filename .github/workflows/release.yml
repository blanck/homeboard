name: Release Android APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump (used when triggered manually)'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            VERSION="${GITHUB_REF_NAME}"
          else
            LAST=$(git tag -l 'v*' --sort=-v:refname | head -1)
            LAST=${LAST:-v0.0.0}
            IFS='.' read -r MAJOR MINOR PATCH <<< "${LAST#v}"
            case "${{ inputs.bump }}" in
              major) MAJOR=$((MAJOR+1)); MINOR=0; PATCH=0;;
              minor) MINOR=$((MINOR+1)); PATCH=0;;
              patch) PATCH=$((PATCH+1));;
            esac
            VERSION="v${MAJOR}.${MINOR}.${PATCH}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Computed version: ${VERSION}"

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: reactnative/package-lock.json

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v4

      - name: Install JS dependencies
        working-directory: reactnative
        run: npm ci

      - name: Inject Tibber OAuth credentials
        working-directory: reactnative
        env:
          TIBBER_CLIENT_ID: ${{ secrets.TIBBER_CLIENT_ID }}
          TIBBER_CLIENT_SECRET: ${{ secrets.TIBBER_CLIENT_SECRET }}
        run: |
          if [ -z "$TIBBER_CLIENT_ID" ] || [ -z "$TIBBER_CLIENT_SECRET" ]; then
            echo "::warning::TIBBER_CLIENT_ID / TIBBER_CLIENT_SECRET secrets are not set; APK will ship without Tibber OAuth."
          fi
          cat > src/secrets.local.js <<EOF
          // Generated by release workflow. Do not commit.
          export const TIBBER_CLIENT_ID = '${TIBBER_CLIENT_ID}';
          export const TIBBER_CLIENT_SECRET = '${TIBBER_CLIENT_SECRET}';
          EOF

      - name: Build release APK
        working-directory: reactnative/android
        run: ./gradlew assembleRelease --no-daemon

      - name: Stage APK
        run: |
          mkdir -p dist
          cp reactnative/android/app/build/outputs/apk/release/app-release.apk \
             "dist/homeboard-${{ steps.version.outputs.version }}.apk"
          ls -la dist

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          target_commitish: ${{ github.sha }}
          files: dist/homeboard-*.apk
          generate_release_notes: true
          fail_on_unmatched_files: true
